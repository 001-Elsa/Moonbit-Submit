name: CI

on:
  push:
  pull_request:

jobs:
  check-build-test:
    name: Check, build, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1.22
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Update MoonBit registry
        run: moon update

      - name: Format check
        run: moon fmt --check

      - name: Check all targets
        run: moon check --target all --deny-warn

      - name: Build
        run: moon build

      - name: Test all targets
        run: moon test --target all --deny-warn

      - name: Verify examples and generated outputs
        shell: pwsh
        run: ./scripts/check.ps1 -Update

      - name: Package metadata
        run: moon info

      - name: Build package
        run: moon package

      - name: Ensure generated files are committed
        run: git diff --exit-code
